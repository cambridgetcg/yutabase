          DELETE FROM test_cards.item_cards
          WHERE card_uuid = '0197a1f4-0000-7000-8000-00000000bb02';
          SQL

      - name: Prepare original v0.1 database under a legacy owner
        run: |
          psql "$UPGRADE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;
          SET ROLE yutabase_legacy_owner;
          \i sql/0001_yu_core.sql
          COMMIT;
          SQL
          psql "$UPGRADE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;
          SET ROLE yutabase_legacy_owner;
          \i sql/0002_starter_lexicon.sql
          COMMIT;
          SQL
          psql "$UPGRADE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          SET ROLE yutabase_legacy_owner;
          CREATE SCHEMA tradein;

          CREATE TABLE tradein.submissions (
            id uuid PRIMARY KEY,
            at timestamptz NOT NULL,
            by text NOT NULL,
            how text NOT NULL CHECK (how IN ('witnessed','live','cached','computed','declared')),
            src text[]
          );

          CREATE TABLE tradein.items (
            id uuid PRIMARY KEY,
            at timestamptz NOT NULL,
            by text NOT NULL,
            how text NOT NULL CHECK (how IN ('witnessed','live','cached','computed','declared')),
            src text[]
          );

          CREATE TABLE tradein.items_remap
            (LIKE tradein.items INCLUDING ALL);

          INSERT INTO yu.registry (book, deck, native, by) VALUES
            ('tradein', 'submissions', true, 'system:ci'),
            ('tradein', 'items', true, 'system:ci');

          INSERT INTO tradein.submissions (id, at, by, how) VALUES
            ('01977c2e-0000-7000-8000-000000000010', now(), 'system:ci', 'declared');
          INSERT INTO tradein.items (id, at, by, how) VALUES
            ('0197a1f4-0000-7000-8000-000000000010', now(), 'system:ci', 'declared'),
            ('0197a1f4-0000-7000-8000-000000000011', now(), 'system:ci', 'declared');
          INSERT INTO tradein.items_remap
            SELECT * FROM tradein.items;

          INSERT INTO yu.threads (
            id, word,
            from_book, from_deck, from_id,
            to_book, to_deck, to_id,
            at, by, how
          ) VALUES
            (
              '01990000-0000-7000-8000-000000000001', 'contains',
              'tradein', 'submissions', '01977c2e-0000-7000-8000-000000000010',
              'tradein', 'items', '0197a1f4-0000-7000-8000-000000000010',
              now(), 'system:ci', 'declared'
            ),
            (
              '01990000-0000-7000-8000-000000000002', 'contains',
              'tradein', 'submissions', '01977c2e-0000-7000-8000-000000000010',
              'tradein', 'items', '0197a1f4-0000-7000-8000-000000000011',
              now(), 'system:ci', 'declared'
            );

          SELECT yu.sever(
            '01990000-0000-7000-8000-000000000002',
            'system:ci',
            'declared'
          );

          GRANT USAGE ON SCHEMA tradein TO yu_writer;
          GRANT SELECT ON tradein.submissions, tradein.items TO yu_writer;
          GRANT USAGE ON SCHEMA tradein TO yu_lexicographer;
          GRANT SELECT ON tradein.items_remap TO yu_lexicographer;

          -- Candidate hardening must replace these legacy direct ACLs with
          -- its exact capability surface before stamping metadata.
          GRANT CREATE ON SCHEMA yu TO yu_writer;
          GRANT DELETE ON yu.threads TO yu_writer;
          GRANT UPDATE (note) ON yu.threads TO yu_writer;
          GRANT EXECUTE ON FUNCTION yu._guard_delete() TO yu_writer;
          RESET ROLE;
          SQL

      - name: Upgrade original v0.1 database under the migration operator
        run: |
          psql "$UPGRADE_URL" --single-transaction -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql

      - name: Assert upgrade identity and preservation
        run: |
          psql "$UPGRADE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $assert$
          BEGIN
            IF NOT EXISTS (
              SELECT 1 FROM yu.standard_meta
              WHERE standard = 'YUTABASE'
                AND profile = 'postgres'
                AND version = '0.1.0-candidate.1'
                AND revision = 4
            ) THEN
              RAISE EXCEPTION 'upgraded database identity does not match';
            END IF;

            IF (SELECT count(*) FROM yu.lexicon) <> 7 THEN
              RAISE EXCEPTION 'upgrade did not preserve the starter lexicon';
            END IF;
            IF (SELECT count(*) FROM yu.registry) <> 2 THEN
              RAISE EXCEPTION 'upgrade did not preserve registry rows';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM yu.registry
              WHERE book = 'tradein' AND deck = 'submissions'
                AND physical_schema = 'tradein'
                AND physical_table = 'submissions'
            ) THEN
              RAISE EXCEPTION 'upgrade did not backfill physical mapping';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM yu.threads
              WHERE id = '01990000-0000-7000-8000-000000000001'
            ) THEN
              RAISE EXCEPTION 'upgrade did not preserve an active thread';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM yu.sever_log
              WHERE id = '01990000-0000-7000-8000-000000000002'
                AND word_version = 1
                AND thread_at IS NULL
                AND thread_by IS NULL
                AND thread_how IS NULL
                AND thread_src IS NULL
            ) THEN
              RAISE EXCEPTION 'upgrade fabricated or lost legacy severance history';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM yu.threads
              WHERE id = '01990000-0000-7000-8000-000000000001'
                AND word_version = 1
                AND word_to_one = false
            ) THEN
              RAISE EXCEPTION 'upgrade did not pin the active thread meaning';
            END IF;
            IF NOT EXISTS (
              SELECT 1 FROM yu.thread_ids
              WHERE id = '01990000-0000-7000-8000-000000000001'
            ) OR NOT EXISTS (
              SELECT 1 FROM yu.thread_ids
              WHERE id = '01990000-0000-7000-8000-000000000002'
            ) THEN
              RAISE EXCEPTION 'upgrade did not reserve active and severed thread UUIDs';
            END IF;
          END
          $assert$;
          SQL

      - name: Assert cross-owner reader, writer, and guard paths
        run: |
          psql "$UPGRADE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $assert$
          BEGIN
            IF EXISTS (
              SELECT 1
              FROM pg_catalog.pg_proc p
              JOIN pg_catalog.pg_namespace n ON n.oid = p.pronamespace
              WHERE n.nspname = 'yu'
                AND pg_catalog.pg_get_userbyid(p.proowner) <> current_user
            ) THEN
              RAISE EXCEPTION 'candidate function ownership was not normalized';
            END IF;

            IF EXISTS (
              SELECT 1
              FROM pg_catalog.pg_class c
              JOIN pg_catalog.pg_namespace n ON n.oid = c.relnamespace
              WHERE n.nspname = 'via' AND c.relkind = 'v'
                AND (
                  pg_catalog.pg_get_userbyid(c.relowner) <> current_user
                  OR NOT (
                    coalesce(c.reloptions, '{}'::text[])
                    @> ARRAY['security_invoker=true']
                  )
                )
            ) THEN
              RAISE EXCEPTION 'candidate view ownership/options were not normalized';
            END IF;

            IF has_schema_privilege('yu_writer', 'yu', 'CREATE')
               OR has_table_privilege('yu_writer', 'yu.threads', 'DELETE')
               OR has_column_privilege('yu_writer', 'yu.threads', 'note', 'UPDATE')
               OR has_function_privilege(
                 'yu_writer', 'yu._guard_delete()', 'EXECUTE'
               ) THEN
              RAISE EXCEPTION 'legacy direct ACLs survived candidate normalization';
            END IF;

            IF (
                 SELECT prosecdef
                 FROM pg_catalog.pg_proc
                 WHERE oid = to_regprocedure('yu._validate_registry_mapping()')
               ) THEN
              RAISE EXCEPTION 'registry physical checks do not run as invoker';
            END IF;
          END
          $assert$;

          SET ROLE yu_lexicographer;
          UPDATE yu.registry
          SET physical_table = 'items_remap',
              at = clock_timestamp(),
              by = 'system:ci/lexicographer'
          WHERE book = 'tradein' AND deck = 'items';
          RESET ROLE;

          DO $assert$
          BEGIN
            IF (SELECT physical_table FROM yu.registry
                WHERE book = 'tradein' AND deck = 'items') <> 'items_remap' THEN
              RAISE EXCEPTION 'authorized cross-owner remap was refused';
            END IF;
          END
          $assert$;

          UPDATE yu.registry
          SET physical_table = 'items',
              at = clock_timestamp(),
              by = 'system:ci/reset'
          WHERE book = 'tradein' AND deck = 'items';
          DROP TABLE tradein.items_remap;

          SET ROLE yu_reader;
          SELECT count(*) FROM via.contains;
          RESET ROLE;

          SET ROLE yu_writer;
          INSERT INTO yu.threads (
            id, word,
            from_book, from_deck, from_id,
            to_book, to_deck, to_id,
            at, by, how
          ) VALUES (
            '01990000-0000-7000-8000-000000000003', 'contains',
            'tradein', 'submissions', '01977c2e-0000-7000-8000-000000000010',
            'tradein', 'items', '0197a1f4-0000-7000-8000-000000000011',
            now(), 'system:ci/writer', 'declared'
          );
          RESET ROLE;

          CREATE TRIGGER items_guard_delete
            BEFORE DELETE ON tradein.items
            FOR EACH ROW EXECUTE FUNCTION yu._guard_delete();

          SET ROLE yutabase_legacy_owner;
          DO $assert$
          DECLARE
            refused boolean := false;
          BEGIN
            BEGIN
              DELETE FROM tradein.items
              WHERE id = '0197a1f4-0000-7000-8000-000000000011';
            EXCEPTION WHEN foreign_key_violation THEN
              refused := true;
            END;
            IF NOT refused THEN
              RAISE EXCEPTION 'cross-owner delete guard ignored a live endpoint';
            END IF;
          END
          $assert$;
          RESET ROLE;
          SQL

      - name: Install SDK dependencies
        working-directory: packages/sdk-ts
        run: bun install --frozen-lockfile

      - name: Test SDK two-phase fresh installer
        working-directory: packages/sdk-ts
        run: |
          bun src/cli.ts init --conn "$SDK_INIT_URL"
          bun src/cli.ts hello --conn "$SDK_INIT_URL" >/dev/null
          sdk_identity="$(psql "$SDK_INIT_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT standard, profile, version, revision
             FROM yu.standard_meta WHERE singleton")"
          if [ "$sdk_identity" != 'YUTABASE|postgres|0.1.0-candidate.1|4' ]; then
            echo "SDK installer produced the wrong identity: $sdk_identity" >&2
            exit 1
          fi

      - name: Test SDK integration against migrated PostgreSQL
        working-directory: packages/sdk-ts
        env:
          DATABASE_URL: ${{ env.FRESH_URL }}
        run: bun run test:integration

      - name: Assert SDK refuses observable candidate drift
        working-directory: packages/sdk-ts
        run: |
          expect_partial() {
            label=$1
            set +e
            output="$(bun src/cli.ts hello --conn "$FRESH_URL" 2>&1)"
            exit_code=$?
            set -e
            if [ "$exit_code" -eq 0 ]; then
              echo "SDK accepted candidate drift: $label" >&2
              exit 1
            fi
            if ! printf '%s\n' "$output" | grep -q 'PARTIAL YUTABASE INSTALL'; then
              printf '%s\n' "$output" >&2
              echo "SDK rejected $label for an unexpected reason" >&2
              exit 1
            fi
          }

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.thread_ids SET UNLOGGED'
          expect_partial unlogged-core
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.thread_ids SET LOGGED'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.registry ALTER COLUMN physical_schema DROP NOT NULL'
          expect_partial candidate-column-nullability
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.registry ALTER COLUMN physical_schema SET NOT NULL'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER TABLE yu.threads ALTER COLUMN note SET DEFAULT ''"
          expect_partial candidate-default-surface
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ALTER COLUMN note DROP DEFAULT'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER INDEX yu.threads_out RENAME TO threads_out_drift'
          expect_partial candidate-index-surface
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER INDEX yu.threads_out_drift RENAME TO threads_out'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER SEQUENCE yu.lexicon_versions_version_id_seq CACHE 2'
          expect_partial candidate-identity-sequence
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER SEQUENCE yu.lexicon_versions_version_id_seq CACHE 1'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads DROP CONSTRAINT threads_sources_nonempty_when_required'
          expect_partial candidate-check-definition
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE yu.threads
            ADD CONSTRAINT threads_sources_nonempty_when_required
            CHECK (
              how NOT IN ('cached', 'computed')
              OR (src IS NOT NULL AND cardinality(src) > 0)
            );
          SQL

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads DISABLE TRIGGER threads_validate'
          expect_partial disabled-trigger
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ENABLE TRIGGER threads_validate'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.lexicon_versions DISABLE TRIGGER ALL'
          expect_partial disabled-current-fk-enforcement
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.lexicon_versions ENABLE TRIGGER ALL'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 <<'SQL'
          SET session_replication_role = replica;
          INSERT INTO yu.lexicon_versions (word, gloss, inverse, changed_by)
          VALUES ('sdk_orphan', 'orphan gloss', 'orphan inverse', 'agent:ci');
          RESET session_replication_role;
          SQL
          expect_partial current-fk-orphan-data
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c "DELETE FROM yu.lexicon_versions WHERE word = 'sdk_orphan'"

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c \
            'ALTER FUNCTION yu._lock_thread_context(text,text,text,uuid,text,text,uuid) RESET row_security'
          expect_partial missing-row-security
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c \
            'ALTER FUNCTION yu._lock_thread_context(text,text,text,uuid,text,text,uuid) SET row_security = off'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c \
            'ALTER FUNCTION yu._validate_thread() SET row_security = off'
          expect_partial invoker-row-security-bypass
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c \
            'ALTER FUNCTION yu._validate_thread() RESET row_security'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER FUNCTION yu.stale() SECURITY DEFINER;
          ALTER FUNCTION yu.stale() SET row_security = off;
          SQL
          expect_partial diagnostic-function-settings
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER FUNCTION yu.stale() SECURITY INVOKER;
          ALTER FUNCTION yu.stale() RESET row_security;
          SQL

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE test_cards.item_cards SET UNLOGGED'
          expect_partial unlogged-registered-deck
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE test_cards.item_cards SET LOGGED'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c 'DROP VIEW via.contains'
          expect_partial missing-via-view
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c 'SELECT yu.refresh_via()'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE OR REPLACE VIEW via.contains WITH (security_invoker = true) AS
          SELECT
            (t.from_book || '/' || t.from_deck || '/' || t.from_id::text) AS from_ref,
            (t.to_book || '/' || t.to_deck || '/' || t.to_id::text) AS to_ref,
            t.note, t.at, t.by, t.how, t.src, t.id AS thread_id,
            t.word_version, v.gloss, v.inverse
          FROM yu.threads t
          JOIN yu.word_versions v
            ON v.word = t.word AND v.word_version = t.word_version
          WHERE t.word = 'contains' AND false;
          SQL
          expect_partial altered-via-view-definition
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c 'SELECT yu.refresh_via()'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c 'ALTER ROLE yu_writer LOGIN'
          expect_partial privileged-capability-role
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 -c 'ALTER ROLE yu_writer NOLOGIN'

          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'REVOKE yu_reader FROM yu_writer'
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'GRANT yu_reader TO yu_writer WITH INHERIT FALSE'
          expect_partial non-inheriting-reader-membership
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'REVOKE yu_reader FROM yu_writer'
          psql "$FRESH_URL" -v ON_ERROR_STOP=1 \
            -c 'GRANT yu_reader TO yu_writer WITH INHERIT TRUE'

          bun src/cli.ts hello --conn "$FRESH_URL" >/dev/null

      - name: Verify SDK and clean installed consumer
        working-directory: packages/sdk-ts
        run: bun run ci
