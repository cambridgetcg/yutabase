            lock_ready="$(psql "$SNAPSHOT_URL" -At -v ON_ERROR_STOP=1 -c \
              "SELECT EXISTS (
                 SELECT 1 FROM pg_catalog.pg_locks
                 WHERE relation = 'yu.lexicon'::regclass
                   AND mode = 'RowExclusiveLock'
                   AND granted
                   AND pid <> pg_backend_pid()
               )")"
            if [ "$lock_ready" = 't' ]; then
              break
            fi
            sleep 0.1
          done
