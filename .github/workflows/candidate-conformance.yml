name: YUTABASE candidate conformance

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yutabase-candidate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  postgres-profile:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        postgres: ['16', '17']

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      PGPASSWORD: postgres
      FRESH_URL: postgresql://postgres:postgres@localhost:5432/yutabase_fresh
      UPGRADE_URL: postgresql://postgres:postgres@localhost:5432/yutabase_upgrade
      INVALID_URL: postgresql://postgres:postgres@localhost:5432/yutabase_invalid
      RLS_URL: postgresql://postgres:postgres@localhost:5432/yutabase_rls
      PERSISTENCE_URL: postgresql://postgres:postgres@localhost:5432/yutabase_persistence
      SNAPSHOT_URL: postgresql://postgres:postgres@localhost:5432/yutabase_snapshot
      SDK_INIT_URL: postgresql://postgres:postgres@localhost:5432/yutabase_sdk_init

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js consumer runtime
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Create isolated test databases
        run: |
          createdb --host localhost --username postgres yutabase_fresh
          psql --host localhost --username postgres --dbname postgres \
            -v ON_ERROR_STOP=1 \
            -c 'CREATE ROLE yutabase_legacy_owner NOLOGIN CREATEROLE'
          psql --host localhost --username postgres --dbname postgres \
            -v ON_ERROR_STOP=1 \
            -c 'CREATE ROLE yutabase_rls_owner NOLOGIN CREATEROLE'
          createdb --host localhost --username postgres \
            --owner yutabase_legacy_owner yutabase_upgrade
          createdb --host localhost --username postgres yutabase_invalid
          createdb --host localhost --username postgres \
            --owner yutabase_rls_owner yutabase_rls
          createdb --host localhost --username postgres yutabase_persistence
          createdb --host localhost --username postgres yutabase_snapshot
          createdb --host localhost --username postgres yutabase_sdk_init

      - name: Assert fresh and upgrade boundaries fail closed
        run: |
          psql "$INVALID_URL" -v ON_ERROR_STOP=1 -c 'CREATE SCHEMA via'

          set +e
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0001_yu_core.sql >/dev/null 2>&1
          collision_status=$?
          set -e
          if [ "$collision_status" -eq 0 ]; then
            echo 'fresh install accepted a pre-existing via namespace' >&2
            exit 1
          fi

          collision_state="$(psql "$INVALID_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regnamespace('yu') IS NULL, to_regnamespace('via') IS NOT NULL")"
          if [ "$collision_state" != 't|t' ]; then
            echo "fresh namespace refusal was not atomic: $collision_state" >&2
            exit 1
          fi

          psql "$INVALID_URL" -v ON_ERROR_STOP=1 -c 'DROP SCHEMA via'

          psql "$INVALID_URL" -v ON_ERROR_STOP=1 \
            -c 'CREATE ROLE yu_lexicographer LOGIN'
          set +e
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0001_yu_core.sql >/dev/null 2>&1
          early_role_collision_status=$?
          set -e
          if [ "$early_role_collision_status" -eq 0 ]; then
            echo 'fresh install accepted a login-role name collision' >&2
            exit 1
          fi
          early_role_state="$(psql "$INVALID_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regnamespace('yu') IS NULL")"
          if [ "$early_role_state" != 't' ]; then
            echo 'fresh role-name refusal left YUTABASE objects behind' >&2
            exit 1
          fi
          psql "$INVALID_URL" -v ON_ERROR_STOP=1 \
            -c 'DROP ROLE yu_lexicographer'

          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 -f sql/0001_yu_core.sql
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 -f sql/0002_starter_lexicon.sql

          psql "$INVALID_URL" -v ON_ERROR_STOP=1 -c 'ALTER ROLE yu_lexicographer LOGIN'
          set +e
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0004_candidate_hardening.sql >/dev/null 2>&1
          role_collision_status=$?
          set -e
          psql "$INVALID_URL" -v ON_ERROR_STOP=1 -c 'ALTER ROLE yu_lexicographer NOLOGIN'
          if [ "$role_collision_status" -eq 0 ]; then
            echo 'candidate upgrade accepted a login-role name collision' >&2
            exit 1
          fi

          psql "$INVALID_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads DROP CONSTRAINT threads_pkey'

          set +e
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0004_candidate_hardening.sql >/dev/null 2>&1
          invalid_upgrade_status=$?
          set -e
          if [ "$invalid_upgrade_status" -eq 0 ]; then
            echo 'candidate upgrade accepted a legacy base without its thread identity key' >&2
            exit 1
          fi

          metadata_absent="$(psql "$INVALID_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'failed candidate upgrade advertised revision metadata' >&2
            exit 1
          fi

          psql "$INVALID_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ADD PRIMARY KEY (id)'
          psql "$INVALID_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ALTER COLUMN by DROP NOT NULL'

          set +e
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0004_candidate_hardening.sql >/dev/null 2>&1
          invalid_shape_status=$?
          set -e
          if [ "$invalid_shape_status" -eq 0 ]; then
            echo 'candidate upgrade accepted a nullable required legacy column' >&2
            exit 1
          fi

          metadata_absent="$(psql "$INVALID_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'failed shape validation advertised revision metadata' >&2
            exit 1
          fi

          psql "$INVALID_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ALTER COLUMN by SET NOT NULL'
          psql "$INVALID_URL" -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE yu_reader NOLOGIN;
          CREATE ROLE yu_writer NOLOGIN;
          CREATE ROLE yutabase_acl_grantor NOLOGIN;
          GRANT DELETE ON yu.threads TO yutabase_acl_grantor WITH GRANT OPTION;
          SET ROLE yutabase_acl_grantor;
          GRANT DELETE ON yu.threads TO yu_writer;
          RESET ROLE;
          SQL

          set +e
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0004_candidate_hardening.sql >/dev/null 2>&1
          surviving_acl_status=$?
          set -e
          if [ "$surviving_acl_status" -eq 0 ]; then
            echo 'candidate upgrade stamped over a surviving multi-grantor ACL' >&2
            exit 1
          fi

          metadata_absent="$(psql "$INVALID_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'failed ACL normalization advertised revision metadata' >&2
            exit 1
          fi

          psql "$INVALID_URL" -v ON_ERROR_STOP=1 <<'SQL'
          SET ROLE yutabase_acl_grantor;
          REVOKE DELETE ON yu.threads FROM yu_writer;
          RESET ROLE;
          REVOKE DELETE ON yu.threads FROM yutabase_acl_grantor;
          DROP ROLE yutabase_acl_grantor;
          ALTER TABLE yu.threads OWNER TO yu_writer;
          SQL

          set +e
          psql "$INVALID_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0004_candidate_hardening.sql >/dev/null 2>&1
          capability_owner_status=$?
          set -e
          if [ "$capability_owner_status" -eq 0 ]; then
            echo 'candidate upgrade accepted a capability role as object owner' >&2
            exit 1
          fi

          metadata_absent="$(psql "$INVALID_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'failed owner validation advertised revision metadata' >&2
            exit 1
          fi

      - name: Assert FORCE RLS paths fail closed
        run: |
          psql "$RLS_URL" -v ON_ERROR_STOP=1 <<'SQL'
          BEGIN;
          SET ROLE yutabase_rls_owner;
          \i sql/0001_yu_core.sql
          \i sql/0002_starter_lexicon.sql
          ALTER TABLE yu.lexicon ENABLE ROW LEVEL SECURITY;
          ALTER TABLE yu.lexicon FORCE ROW LEVEL SECURITY;
          CREATE POLICY hide_legacy_words ON yu.lexicon
            USING (false) WITH CHECK (false);
          COMMIT;
          SQL

          set +e
          rls_migration_output="$(psql "$RLS_URL" -v ON_ERROR_STOP=1 2>&1 <<'SQL'
          BEGIN;
          SET ROLE yutabase_rls_owner;
          \i sql/0004_candidate_hardening.sql
          COMMIT;
          SQL
          )"
          rls_migration_status=$?
          set -e
          if [ "$rls_migration_status" -eq 0 ]; then
            echo 'candidate migration validated through a FORCE RLS policy' >&2
            exit 1
          fi
          if ! printf '%s\n' "$rls_migration_output" | grep -q 'row-level security policy'; then
            printf '%s\n' "$rls_migration_output" >&2
            echo 'candidate migration failed for an unexpected non-RLS reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$RLS_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'FORCE RLS refusal advertised revision metadata' >&2
            exit 1
          fi

          psql "$RLS_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0004_candidate_hardening.sql
          backfill_state="$(psql "$RLS_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT (SELECT count(*) FROM yu.lexicon),
                    (SELECT count(*) FROM yu.word_versions WHERE word_version = 1)")"
          if [ "$backfill_state" != '7|7' ]; then
            echo "bypass-capable FORCE RLS migration lost snapshots: $backfill_state" >&2
            exit 1
          fi

          psql "$RLS_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE yu.threads ENABLE ROW LEVEL SECURITY;
          ALTER TABLE yu.threads FORCE ROW LEVEL SECURITY;
          CREATE POLICY hide_threads ON yu.threads USING (false) WITH CHECK (false);
          ALTER FUNCTION yu._registry_referenced_ids(text, text)
            OWNER TO yutabase_rls_owner;
          SQL

          set +e
          rls_runtime_output="$(psql "$RLS_URL" -At -v ON_ERROR_STOP=1 \
            -c "SELECT count(*) FROM yu._registry_referenced_ids('test', 'test')" 2>&1)"
          rls_runtime_status=$?
          set -e
          if [ "$rls_runtime_status" -eq 0 ]; then
            echo 'global definer query silently filtered through FORCE RLS' >&2
            exit 1
          fi
          if ! printf '%s\n' "$rls_runtime_output" | grep -q 'row-level security policy'; then
            printf '%s\n' "$rls_runtime_output" >&2
            echo 'global definer query failed for an unexpected non-RLS reason' >&2
            exit 1
          fi

      - name: Refuse unsafe legacy core surfaces
        run: |
          psql "$PERSISTENCE_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0001_yu_core.sql
          psql "$PERSISTENCE_URL" --single-transaction -v ON_ERROR_STOP=1 \
            -f sql/0002_starter_lexicon.sql

          assert_unstamped_refusal() {
            local label="$1"
            local expected="$2"
            local output
            local status
            local metadata_absent

            set +e
            output="$(psql "$PERSISTENCE_URL" --single-transaction \
              -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              echo "candidate migration accepted $label" >&2
              exit 1
            fi
            if ! printf '%s\n' "$output" | grep -Fq "$expected"; then
              printf '%s\n' "$output" >&2
              echo "$label failed for an unexpected reason" >&2
              exit 1
            fi

            metadata_absent="$(psql "$PERSISTENCE_URL" -At \
              -v ON_ERROR_STOP=1 -c \
              "SELECT to_regclass('yu.standard_meta') IS NULL")"
            if [ "$metadata_absent" != 't' ]; then
              echo "$label advertised revision metadata" >&2
              exit 1
            fi
          }

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER TABLE yu.threads ALTER COLUMN how SET DEFAULT 'declared'"
          assert_unstamped_refusal \
            'an added legacy core default' \
            'unexpected legacy core default surface'
          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ALTER COLUMN how DROP DEFAULT'

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c "UPDATE yu.threads SET note = '' WHERE note IS NULL"
          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ALTER COLUMN note SET NOT NULL'
          assert_unstamped_refusal \
            'changed legacy optional-column nullability' \
            'yu.threads.note must be text'
          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads ALTER COLUMN note DROP NOT NULL'

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.registry ALTER COLUMN by TYPE text COLLATE "C"'
          assert_unstamped_refusal \
            'a changed legacy core collation' \
            'yu.registry.by must be text'
          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.registry ALTER COLUMN by TYPE text COLLATE "default"'

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'CREATE INDEX unexpected_legacy_index ON yu.threads (at)'
          assert_unstamped_refusal \
            'an added legacy core index' \
            'unexpected legacy core index surface'
          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'DROP INDEX yu.unexpected_legacy_index'

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER SEQUENCE yu.lexicon_versions_version_id_seq CACHE 2'
          assert_unstamped_refusal \
            'drifted legacy identity-sequence options' \
            'yu.lexicon_versions.version_id identity sequence is invalid'
          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER SEQUENCE yu.lexicon_versions_version_id_seq CACHE 1'

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 \
            -c 'ALTER TABLE yu.threads SET UNLOGGED'

          set +e
          persistence_output="$(psql "$PERSISTENCE_URL" --single-transaction \
            -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
          persistence_status=$?
          set -e
          if [ "$persistence_status" -eq 0 ]; then
            echo 'candidate migration accepted an unlogged legacy core table' >&2
            exit 1
          fi
          if ! printf '%s\n' "$persistence_output" | grep -q \
            'must be a standalone permanent ordinary table'; then
            printf '%s\n' "$persistence_output" >&2
            echo 'legacy persistence check failed for an unexpected reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$PERSISTENCE_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'legacy persistence refusal advertised revision metadata' >&2
            exit 1
          fi

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE yu.threads SET LOGGED;
          CREATE TABLE yu.inherited_threads () INHERITS (yu.threads);
          SQL

          set +e
          inheritance_output="$(psql "$PERSISTENCE_URL" --single-transaction \
            -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
          inheritance_status=$?
          set -e
          if [ "$inheritance_status" -eq 0 ]; then
            echo 'candidate migration accepted an inherited legacy core table' >&2
            exit 1
          fi
          if ! printf '%s\n' "$inheritance_output" | grep -q \
            'must be a standalone permanent ordinary table'; then
            printf '%s\n' "$inheritance_output" >&2
            echo 'legacy inheritance check failed for an unexpected reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$PERSISTENCE_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'legacy inheritance refusal advertised revision metadata' >&2
            exit 1
          fi

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DROP TABLE yu.inherited_threads;
          ALTER TABLE yu.threads DROP CONSTRAINT
            threads_word_from_book_from_deck_from_id_to_book_to_deck_to_key;
          CREATE UNIQUE INDEX threads_relation_lookalike ON yu.threads (
            word, from_book, from_deck, from_id, to_book, to_deck, to_id
          );
          ALTER TABLE yu.threads ADD CONSTRAINT zz_restrictive
            CHECK (note IS NULL);
          SQL

          set +e
          index_lookalike_output="$(psql "$PERSISTENCE_URL" --single-transaction \
            -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
          index_lookalike_status=$?
          set -e
          if [ "$index_lookalike_status" -eq 0 ]; then
            echo 'candidate migration accepted a standalone index as its legacy relation key' >&2
            exit 1
          fi
          if ! printf '%s\n' "$index_lookalike_output" | grep -q \
            'key is absent or invalid'; then
            printf '%s\n' "$index_lookalike_output" >&2
            echo 'legacy relation-key lookalike failed for an unexpected reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$PERSISTENCE_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'legacy relation-key lookalike advertised revision metadata' >&2
            exit 1
          fi

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE yu.threads DROP CONSTRAINT zz_restrictive;
          DROP INDEX yu.threads_relation_lookalike;
          ALTER TABLE yu.threads ADD CONSTRAINT
            threads_word_from_book_from_deck_from_id_to_book_to_deck_to_key
            UNIQUE (
              word, from_book, from_deck, from_id,
              to_book, to_deck, to_id
            ) DEFERRABLE;
          SQL

          set +e
          deferred_key_output="$(psql "$PERSISTENCE_URL" --single-transaction \
            -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
          deferred_key_status=$?
          set -e
          if [ "$deferred_key_status" -eq 0 ]; then
            echo 'candidate migration accepted a deferrable legacy relation key' >&2
            exit 1
          fi
          if ! printf '%s\n' "$deferred_key_output" | grep -q \
            'key is absent or invalid'; then
            printf '%s\n' "$deferred_key_output" >&2
            echo 'deferrable legacy relation key failed for an unexpected reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$PERSISTENCE_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'deferrable legacy relation-key refusal advertised revision metadata' >&2
            exit 1
          fi

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE yu.threads DROP CONSTRAINT
            threads_word_from_book_from_deck_from_id_to_book_to_deck_to_key;
          ALTER TABLE yu.threads ADD CONSTRAINT
            threads_word_from_book_from_deck_from_id_to_book_to_deck_to_key
            UNIQUE (
              word, from_book, from_deck, from_id,
              to_book, to_deck, to_id
            );
          ALTER TABLE yu.lexicon DROP CONSTRAINT lexicon_status_check;
          ALTER TABLE yu.lexicon ADD CONSTRAINT lexicon_status_check
            CHECK (status = 'live');
          SQL

          set +e
          constraint_output="$(psql "$PERSISTENCE_URL" --single-transaction \
            -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
          constraint_status=$?
          set -e
          if [ "$constraint_status" -eq 0 ]; then
            echo 'candidate migration accepted a same-named altered legacy constraint' >&2
            exit 1
          fi
          if ! printf '%s\n' "$constraint_output" | grep -q \
            'definition is absent or invalid'; then
            printf '%s\n' "$constraint_output" >&2
            echo 'altered legacy constraint check failed for an unexpected reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$PERSISTENCE_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'altered legacy constraint refusal advertised revision metadata' >&2
            exit 1
          fi

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE yu.lexicon DROP CONSTRAINT lexicon_status_check;
          ALTER TABLE yu.lexicon ADD CONSTRAINT lexicon_status_check
            CHECK (status IN ('live', 'retired'));
          ALTER TABLE yu.lexicon_versions DISABLE TRIGGER ALL;
          SQL

          set +e
          disabled_fk_output="$(psql "$PERSISTENCE_URL" --single-transaction \
            -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
          disabled_fk_status=$?
          set -e
          if [ "$disabled_fk_status" -eq 0 ]; then
            echo 'candidate migration accepted disabled legacy FK triggers' >&2
            exit 1
          fi
          if ! printf '%s\n' "$disabled_fk_output" | grep -q \
            'foreign key is absent or invalid'; then
            printf '%s\n' "$disabled_fk_output" >&2
            echo 'disabled legacy FK trigger check failed for an unexpected reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$PERSISTENCE_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'disabled legacy FK trigger refusal advertised revision metadata' >&2
            exit 1
          fi

          psql "$PERSISTENCE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          ALTER TABLE yu.lexicon_versions ENABLE TRIGGER ALL;
          SET session_replication_role = replica;
          INSERT INTO yu.lexicon_versions (word, gloss, inverse, changed_by)
          VALUES ('orphaned_word', 'orphaned gloss', 'orphaned inverse', 'agent:ci');
          RESET session_replication_role;
          SQL

          set +e
          orphan_fk_output="$(psql "$PERSISTENCE_URL" --single-transaction \
            -v ON_ERROR_STOP=1 -f sql/0004_candidate_hardening.sql 2>&1)"
          orphan_fk_status=$?
          set -e
          if [ "$orphan_fk_status" -eq 0 ]; then
            echo 'candidate migration accepted orphaned legacy FK data' >&2
            exit 1
          fi
          if ! printf '%s\n' "$orphan_fk_output" | grep -q \
            'legacy word foreign-key data is inconsistent'; then
            printf '%s\n' "$orphan_fk_output" >&2
            echo 'orphaned legacy FK data failed for an unexpected reason' >&2
            exit 1
          fi

          metadata_absent="$(psql "$PERSISTENCE_URL" -At -v ON_ERROR_STOP=1 -c \
            "SELECT to_regclass('yu.standard_meta') IS NULL")"
          if [ "$metadata_absent" != 't' ]; then
            echo 'orphaned legacy FK refusal advertised revision metadata' >&2
            exit 1
          fi

