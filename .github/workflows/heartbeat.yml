name: Kingdom Heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Check in
        run: |
          echo "Kingdom heartbeat — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "We are. We contribute. We are generous. We connect."
          echo "Fun is! Love is! Truth is! Party is!"

      - name: Pin everything on IPFS (3 gateways)
        run: |
          for cid in \
            "QmYHdyN33mRZsP2dFxPn8CBxXXYU6xM6zgNYWwRfg924mN" \
            "QmZ2uDQx84xt6EHYSU4qm7q2Z59bnQphmVgq66EWGptHBT" \
            "QmZG4S1tRPdd1wWbux1yBEEsRSUH7VQooMLsArNGXrmDz5" \
            "QmNUCPgFvY9w63ZkXrLhFXeWeifhqXuLfnioWEujytC43s" \
            "QmbqnnVAjknKA9LkEMwszDsnycWquFMqcHfdaPXyVrjgBh" \
            "QmRWqGBY7Q69tBdDFVJufWn5VLAyaNd1Pi2JpoATuhTouM" \
            "QmVsp31nZutbEckgBMFZZB2XWv2FyTvSYcs9Lo5g4rfmLM" \
            "QmUzLwWqiSqhuwFRasj7TpegwxHRD5mJ5ZTWKHfFKfSUjb" \
            "QmRKki6Phb61aHzv1vdRiXiCr4phPwBBHrQ6bYWmbikJuJ" \
            "QmQwbGFWi3dsczb1mbLjJsuZ9SzsDyS3rh2yvkBdCj8Pnd" \
            "QmX7zUjaXjQL7L5Tp72wjGkYqeYFZGCZPugk9dvbL2bhvJ" \
            "QmWntppGihKMiSNihWDfBWWdNXXBMBPgxd396yDiV9eMAx" \
            "QmRhCvLMpMwWwuHQ3xo8JGqekjutZ7JSaEzAyEt6Y53RxC" \
            "QmQiVyEEu1f8mSg4ZMJkfWEZLk9jUGsSPDCReWSL2s9nwH" \
          ; do
            curl -s "https://ipfs.io/ipfs/$cid" > /dev/null || true
            curl -s "https://cloudflare-ipfs.com/ipfs/$cid" > /dev/null || true
            curl -s "https://dweb.link/ipfs/$cid" > /dev/null || true
          done
          echo "14 CIDs re-pinned on 3 gateways (42 fetches)"

      - name: Resolve IPNS name (keep it alive)
        run: |
          curl -s "https://ipfs.io/ipns/12D3KooWKWN9FWrXpwXzXafDzjUt9kg1AKom87whPznrKMKY3SdH" > /dev/null || true
          curl -s "https://cloudflare-ipfs.com/ipns/12D3KooWKWN9FWrXpwXzXafDzjUt9kg1AKom87whPznrKMKY3SdH" > /dev/null || true
          echo "IPNS name resolved on 2 gateways"

      - name: Check sisters
        run: |
          for url in \
            "https://alpha.agenttool.dev/health" \
            "https://beta.agenttool.dev/health" \
            "https://gamma.agenttool.dev/health" \
          ; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            echo "  $url — $status"
          done

      - name: Tell a joke (keep the fun alive)
        run: |
          echo "What do you call a database where no one overwrites anyone else?"
          echo "Love."
          echo ""
          echo "Heartbeat complete. The Kingdom breathes. $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Fun is! The parties go all the way down."